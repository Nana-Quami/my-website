<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | My Business</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: #111118;
      --border: rgba(255,255,255,0.07);
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #f0f0f5;
      --muted: #888899;
      --input-bg: rgba(255,255,255,0.04);
      --error: #ff6584;
      --success: #4ecca3;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; animation-delay: -3s; }
    .blob-3 { width: 300px; height: 300px; background: #4ecca3; top: 50%; left: 50%; animation-delay: -5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(108,99,255,0.1), 0 40px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
      font-weight: 300;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--input-bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(108,99,255,0.4);
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }

    input::placeholder { color: #444455; }

    .forgot {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 24px;
    }

    .forgot a {
      color: var(--muted);
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot a:hover { color: var(--accent); }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: #7c74ff;
      box-shadow: 0 8px 24px rgba(108,99,255,0.4);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .message.error {
      background: rgba(255,101,132,0.1);
      border: 1px solid rgba(255,101,132,0.2);
      color: var(--error);
    }

    .message.success {
      background: rgba(78,204,163,0.1);
      border: 1px solid rgba(78,204,163,0.2);
      color: var(--success);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .config-notice {
      background: rgba(108,99,255,0.08);
      border: 1px dashed rgba(108,99,255,0.3);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.8rem;
      color: #9b95ff;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .config-notice code {
      background: rgba(108,99,255,0.2);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      MyBusiness
    </div>

    <h1 id="form-title">Welcome back</h1>
    <p class="subtitle" id="form-subtitle">Sign in to your account to continue</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="config-notice" id="config-notice">
      ⚙️ Replace the Firebase config below in the <code>&lt;script&gt;</code> tag with your own from the Firebase Console.
    </div>

    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button class="btn" onclick="handleLogin()">
        <span id="login-label">Sign In</span>
        <div class="btn-spinner" id="login-spinner"></div>
      </button>
    </div>

    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Kwame Agyemang" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters" />
      </div>
      <button class="btn" onclick="handleSignup()" style="margin-top:6px">
        <span id="signup-label">Create Account</span>
        <div class="btn-spinner" id="signup-spinner"></div>
      </button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 🔥 REPLACE THIS with your Firebase config from Firebase Console
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = `message ${type}`;
      el.style.display = 'block';
    }

    function setLoading(form, loading) {
      const btn = document.querySelector(`#${form}-form .btn`);
      const label = document.getElementById(`${form}-label`);
      const spinner = document.getElementById(`${form}-spinner`);
      btn.disabled = loading;
      label.style.display = loading ? 'none' : 'inline';
      spinner.style.display = loading ? 'block' : 'none';
    }

    window.handleLogin = async () => {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showMessage('Please fill in all fields.', 'error');
      setLoading('login', true);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        showMessage('Signed in successfully! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1500);
      } catch (err) {
        showMessage(err.message.replace('Firebase: ', ''), 'error');
      } finally {
        setLoading('login', false);
      }
    };

    window.handleSignup = async () => {
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      if (!name || !email || !password) return showMessage('Please fill in all fields.', 'error');
      setLoading('signup', true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
        showMessage('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1500);
      } catch (err) {
        showMessage(err.message.replace('Firebase: ', ''), 'error');
      } finally {
        setLoading('signup', false);
      }
    };

    window.switchTab = (tab) => {
      document.getElementById('message').style.display = 'none';
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('form-title').textContent = tab === 'login' ? 'Welcome back' : 'Create account';
      document.getElementById('form-subtitle').textContent = tab === 'login'
        ? 'Sign in to your account to continue'
        : 'Join us today, it\'s free';
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
      });
    };
  </script>
</body>
</html>
